name: Build Plugins and Tools

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Get VST 2.4 SDK
      run: git clone https://github.com/R-Tur/VST_SDK_2.4.git

    - name: Build NoGUI Plugins
      run: make -f Makefile.nogui

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-vst
        path: SN*.so

  release:
    runs-on: ubuntu-latest
    needs: [build-linux]   # Wait for build-linux (and future build-windows) to finish
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Download Linux artifacts
      uses: actions/download-artifact@v4
      with:
        name: linux-vst
        path: linux_build

    # --- In future, add download for Windows artifacts here ---
    # - uses: actions/download-artifact@v4
    #   with:
    #     name: windows-vst
    #     path: windows_build

    - name: Create ZIP with commit hash
      run: |
        COMMIT_HASH=$(git rev-parse --short HEAD)
        mkdir SenderSpikePlugins
        mv linux_build SenderSpikePlugins/Linux
        # mv windows_build SenderSpikePlugins/Windows  # for future Windows files
        zip -r SenderSpikePlugins-$COMMIT_HASH.zip SenderSpikePlugins/
        echo "ZIP_NAME=SenderSpikePlugins-$COMMIT_HASH.zip" >> $GITHUB_ENV

    - name: Create GitHub Release
      id: create_release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Release ${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload ZIP as release asset
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ env.ZIP_NAME }}
        asset_name: ${{ env.ZIP_NAME }}
        asset_content_type: application/zip
