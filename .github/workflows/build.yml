name: Build Plugins and Tools

on:
  push:
    branches: [ main, juce ]
  pull_request:
    branches: [ main, juce ]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libgl1-mesa-dev \
          libasound2-dev \
          libfreetype6-dev \
          libfontconfig1-dev

    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Get VST 2.4 SDK
      run: git clone https://github.com/R-Tur/VST_SDK_2.4.git

    - name: Build Plugins
      run: |
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release -- -j$(nproc)

    - name: Prepare Artifacts
      run: |
        mkdir -p release
        mv build/VST/*.so release/
        mv build/VST3/*.vst3 release/
        mv build/LV2/*.lv2 release/

    - name: Upload Artifacts
      uses: actions/upload-artifact@v6
      with:
        name: linux-plugins
        path: release/**

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
  
      - name: Get VST 2.4 SDK
        run: git clone https://github.com/R-Tur/VST_SDK_2.4.git
  
      - name: Configure Build (Release)
        run: |
          cmake -B build -S . -G "Visual Studio 17 2022" -A x64
  
      - name: Build Plugins
        run: |
          cmake --build build --config Release --parallel
  
      - name: Prepare Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          
          Get-ChildItem build\VST -Filter *.dll -Recurse |
            Move-Item -Destination release\
            
          Get-ChildItem build\VST3 -Filter *.vst3 -Recurse |
            Move-Item -Destination release\

          Get-ChildItem build\LV2 -Filter *.lv2 -Recurse |
            Move-Item -Destination release\

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-plugins
          path: release/**

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Download Linux artifacts
      uses: actions/download-artifact@v8
      with:
        name: linux-plugins
        path: linux_build

    - name: Download Linux artifacts
      uses: actions/download-artifact@v8
      with:
        name: windows-plugins
        path: windows_build

    - name: Create ZIP with commit hash
      run: |
        RELEASE_NUM=${{ github.run_number }}
        mkdir SenderSpikePlugins
        mv linux_build SenderSpikePlugins/Linux
        mv windows_build SenderSpikePlugins/Windows
        zip -r SenderSpikePlugins-$RELEASE_NUM.zip SenderSpikePlugins/
        echo "ZIP_NAME=SenderSpikePlugins-$RELEASE_NUM.zip" >> $GITHUB_ENV

    - name: Create GitHub Release
      id: create_release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release ${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish GitHub Release
      if: github.ref == 'refs/heads/main'
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        tag: v${{ github.run_number }}
        release_name: Release ${{ github.run_number }}
        file: ${{ env.ZIP_NAME }}
        overwrite: true
